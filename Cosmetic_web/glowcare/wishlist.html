<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - GlowCare</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header id="header" class="sticky">
        <nav class="navbar">
            <div class="logo">GlowCare</div>
            <div class="hamburger" id="hamburger">
                <div></div><div></div><div></div>
            </div>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="quiz.html">Skin Quiz</a></li>
                <li><a href="cart.html">Cart <span id="cart-count">0</span></a></li>
                <li><a href="wishlist.html">Wishlist <span id="wish-count">0</span></a></li>
            </ul>
            <div class="toggle-mode">
                <button id="mode-toggle">🌙</button>
            </div>
        </nav>
    </header>

    <section class="container">
        <h2>Your Wishlist</h2>
        <div id="wish-items"></div>
    </section>

    <footer>
        <p>&copy; 2026 GlowCare. All rights reserved.</p>
    </footer>

    <script src="js/products.js?v=2"></script>
    <script src="js/cart.js?v=2"></script>
    <script src="js/main.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded',()=>{
            const cont=document.getElementById('wish-items');
            function render(){
                const w=getWish();
                cont.innerHTML='';
                w.forEach(id=>{
                    const p=products.find(x=>x.id===id);
                    if(p){
                        const d=document.createElement('div');
                        d.className='product-card';
                        d.innerHTML=`<img src="${p.img}" alt="${p.name}"><h3>${p.name}</h3><p>$${p.price}</p>`;
                        cont.appendChild(d);
                    }
                });
            }
            render();
        });
    </script>
</body>
</html>
