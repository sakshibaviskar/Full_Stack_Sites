<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenLeaf Nursery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f4fff4;
}

header{
    background:#2e7d32;
    color:white;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.search-box{
    text-align:center;
    margin:20px;
}

.search-box input{
    padding:10px;
    width:250px;
    border:1px solid #ccc;
    border-radius:5px;
}

.search-box button{
    padding:10px 15px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.card-content h3{
    margin-bottom:10px;
}

.price{
    color:#2e7d32;
    font-weight:bold;
    margin-bottom:10px;
}

button.add{
    padding:8px 12px;
    background:#388e3c;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.cart{
    position:fixed;
    top:20px;
    right:20px;
    background:white;
    padding:10px 15px;
    border-radius:20px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    font-weight:bold;
}

footer{
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:10px;
    margin-top:20px;
}
</style>
</head>

<body>

<header>🌿 GreenLeaf Plant Nursery</header>

<div class="cart">
    🛒 Cart: <span id="cartCount">0</span>
</div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search plants...">
    <button onclick="searchPlant()">Search</button>
</div>

<div class="container" id="productContainer">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" alt="">
        <div class="card-content">
            <h3>Aloe Vera</h3>
            <div class="price">₹299</div>
            <button class="add" onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1498837167922-ddd27525d352" alt="">
        <div class="card-content">
            <h3>Snake Plant</h3>
            <div class="price">₹499</div>
            <button class="add" onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1463320726281-696a485928c7" alt="">
        <div class="card-content">
            <h3>Peace Lily</h3>
            <div class="price">₹599</div>
            <button class="add" onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93" alt="">
        <div class="card-content">
            <h3>Money Plant</h3>
            <div class="price">₹349</div>
            <button class="add" onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

</div>

<footer>
    © 2026 GreenLeaf Nursery | Fresh Plants Delivered 🌱
</footer>

<script>
let cart = 0;

function addToCart(){
    cart++;
    document.getElementById("cartCount").innerText = cart;
}

function searchPlant(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for(let i=0; i<cards.length; i++){
        let title = cards[i].getElementsByTagName("h3")[0].innerText.toLowerCase();
        if(title.includes(input)){
            cards[i].style.display="block";
        } else{
            cards[i].style.display="none";
        }
    }
}
</script>

</body>
</html>
