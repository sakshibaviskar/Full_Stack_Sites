<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxeGlow Jewelry</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#fdf9f7;
}

/* NAVBAR */
nav{
    background:#111;
    color:white;
    padding:15px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav h1{
    color:#d4af37;
}

nav button{
    background:#d4af37;
    border:none;
    padding:8px 15px;
    cursor:pointer;
    font-weight:bold;
}

/* HERO */
.hero{
    height:60vh;
    background:url('https://images.unsplash.com/photo-1611599537845-1c1c1c1c1c1c?auto=format&fit=crop&w=1600&q=80') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h2{
    font-size:40px;
    background:rgba(0,0,0,0.6);
    padding:20px;
}

/* PRODUCTS */
.products{
    padding:50px 8%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin:10px 0;
}

.card p{
    color:#555;
}

.card button{
    margin-top:10px;
    padding:8px 15px;
    background:#d4af37;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* CART MODAL */
.cart{
    position:fixed;
    top:0;
    right:-400px;
    width:350px;
    height:100%;
    background:white;
    box-shadow:-5px 0 15px rgba(0,0,0,0.2);
    padding:20px;
    transition:0.4s;
    overflow-y:auto;
}

.cart.active{
    right:0;
}

.cart h2{
    margin-bottom:15px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.total{
    font-weight:bold;
    margin-top:15px;
}

.close{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    cursor:pointer;
    float:right;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}
</style>
</head>

<body>

<nav>
    <h1>LuxeGlow</h1>
    <button onclick="toggleCart()">Cart 🛒 (<span id="cartCount">0</span>)</button>
</nav>

<section class="hero">
    <h2>Elegant Jewelry Collection</h2>
</section>

<section class="products" id="productList"></section>

<div class="cart" id="cart">
    <button class="close" onclick="toggleCart()">X</button>
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div class="total">Total: ₹ <span id="totalPrice">0</span></div>
</div>

<footer>
    © 2026 LuxeGlow Jewelry Store | All Rights Reserved
</footer>

<script>
const products = [
    {
        name:"Gold Necklace",
        price:4999,
        image:"https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f"
    },
    {
        name:"Diamond Ring",
        price:7999,
        image:"https://images.unsplash.com/photo-1605106702845-8f8f1e1e1e1e"
    },
    {
        name:"Silver Bracelet",
        price:1999,
        image:"https://images.unsplash.com/photo-1589363360147-4f3b7a1b1b1b"
    },
    {
        name:"Pearl Earrings",
        price:2499,
        image:"https://images.unsplash.com/photo-1617038220319-276d3cfab638"
    }
];

let cart = [];

function displayProducts(){
    const productList = document.getElementById("productList");
    productList.innerHTML = "";
    products.forEach((product,index)=>{
        productList.innerHTML += `
            <div class="card">
                <img src="${product.image}?auto=format&fit=crop&w=400&q=80">
                <h3>${product.name}</h3>
                <p>₹ ${product.price}</p>
                <button onclick="addToCart(${index})">Add to Cart</button>
            </div>
        `;
    });
}

function addToCart(index){
    cart.push(products[index]);
    updateCart();
}

function updateCart(){
    const cartItems = document.getElementById("cartItems");
    const cartCount = document.getElementById("cartCount");
    const totalPrice = document.getElementById("totalPrice");

    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach(item=>{
        total += item.price;
        cartItems.innerHTML += `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>₹ ${item.price}</span>
            </div>
        `;
    });

    cartCount.innerText = cart.length;
    totalPrice.innerText = total;
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("active");
}

displayProducts();
</script>

</body>
</html>
