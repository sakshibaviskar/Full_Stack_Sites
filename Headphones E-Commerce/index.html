<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundMax - Headphones Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f7fb;
}

/* NAVBAR */
nav{
    background:#1a1a1a;
    color:white;
    padding:15px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav h1{
    color:#00bcd4;
}

nav input{
    padding:7px;
    border:none;
    border-radius:5px;
}

nav button{
    padding:7px 12px;
    border:none;
    background:#00bcd4;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border-radius:5px;
}

/* HERO */
.hero{
    height:60vh;
    background:url('https://images.unsplash.com/photo-1518444028785-8fbcd101ebb9?auto=format&fit=crop&w=1600&q=80') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h2{
    background:rgba(0,0,0,0.6);
    padding:20px;
    font-size:38px;
}

/* FILTER */
.filter{
    padding:30px 8%;
    text-align:center;
}

.filter select{
    padding:8px;
    border-radius:5px;
}

/* PRODUCTS */
.products{
    padding:20px 8%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin:10px 0;
}

.price{
    color:#00bcd4;
    font-weight:bold;
}

.card button{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    background:#00bcd4;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

/* CART */
.cart{
    position:fixed;
    right:-350px;
    top:0;
    width:320px;
    height:100%;
    background:white;
    box-shadow:-5px 0 15px rgba(0,0,0,0.2);
    padding:20px;
    transition:0.4s;
    overflow-y:auto;
}

.cart.active{
    right:0;
}

.cart h2{
    margin-bottom:15px;
}

.cart-item{
    margin-bottom:10px;
    border-bottom:1px solid #eee;
    padding-bottom:5px;
}

.total{
    font-weight:bold;
    margin-top:15px;
}

.close{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    cursor:pointer;
    float:right;
}

footer{
    background:#1a1a1a;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>
</head>

<body>

<nav>
    <h1>SoundMax 🎧</h1>
    <div>
        <input type="text" id="search" placeholder="Search headphones..." onkeyup="searchProduct()">
        <button onclick="toggleCart()">Cart 🛒 (<span id="cartCount">0</span>)</button>
    </div>
</nav>

<section class="hero">
    <h2>Feel The Beat. Hear The Difference.</h2>
</section>

<section class="filter">
    <select onchange="filterCategory(this.value)">
        <option value="all">All</option>
        <option value="wireless">Wireless</option>
        <option value="gaming">Gaming</option>
        <option value="studio">Studio</option>
    </select>
</section>

<section class="products" id="productList"></section>

<div class="cart" id="cart">
    <button class="close" onclick="toggleCart()">X</button>
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div class="total">Total: ₹ <span id="totalPrice">0</span></div>
</div>

<footer>
    © 2026 SoundMax Headphones Store | Pure Sound Experience
</footer>

<script>
const products = [
    {name:"Wireless Bass Pro", price:2499, category:"wireless", image:"https://images.unsplash.com/photo-1518444028785-8fbcd101ebb9"},
    {name:"Gaming Xtreme", price:2999, category:"gaming", image:"https://images.unsplash.com/photo-1580894908361-967195033215"},
    {name:"Studio Monitor HD", price:3499, category:"studio", image:"https://images.unsplash.com/photo-1519677100203-a0e668c92439"},
    {name:"Bluetooth Lite", price:1999, category:"wireless", image:"https://images.unsplash.com/photo-1512058564366-c9e3a3f7b0c0"}
];

let cart = [];

function displayProducts(items){
    const productList = document.getElementById("productList");
    productList.innerHTML="";
    items.forEach((product)=>{
        productList.innerHTML += `
        <div class="card">
            <img src="${product.image}?auto=format&fit=crop&w=400&q=80">
            <h3>${product.name}</h3>
            <div class="price">₹ ${product.price}</div>
            <button onclick="addToCart('${product.name}', ${product.price})">Add to Cart</button>
        </div>`;
    });
}

function addToCart(name,price){
    cart.push({name,price});
    updateCart();
}

function updateCart(){
    let total=0;
    document.getElementById("cartItems").innerHTML="";
    cart.forEach(item=>{
        total+=item.price;
        document.getElementById("cartItems").innerHTML+=`
        <div class="cart-item">
            <div>${item.name}</div>
            <div>₹ ${item.price}</div>
        </div>`;
    });
    document.getElementById("cartCount").innerText=cart.length;
    document.getElementById("totalPrice").innerText=total;
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("active");
}

function filterCategory(category){
    if(category==="all"){
        displayProducts(products);
    } else {
        const filtered = products.filter(p=>p.category===category);
        displayProducts(filtered);
    }
}

function searchProduct(){
    const value=document.getElementById("search").value.toLowerCase();
    const filtered=products.filter(p=>p.name.toLowerCase().includes(value));
    displayProducts(filtered);
}

displayProducts(products);
</script>

</body>
</html>
