<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2 style="margin-right: 10px;">Typer</h2>
        <a href="#">Home</a>
        <a href="#">Typing Test</a>
        <a href="#">Typing Test Result</a>
    </nav>
    <h1>Typing Test</h1>
    
    <div class="data">
        <h3>Select your test</h3>
    <select id="dropdown" aria-placeholder="Select your test">
        <option value="1">30 SecondTest</option>
        <option value="2">1 Minute Test</option>
        <option value="3">2 Minute Test</option>
        <option value="4">3 Minute Test</option>
    </select>
    <h3>Select the level of hardness</h3>
    <select id="difficulty" aria-placeholder="Select your test type">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
    </select>
    <br>
    <button id="start">Start Test</button>
        <!-- <h2>
            Typing Text below
        </h2>
        <h4>
            Text
        </h4>
        <input type="text" placeholder="Text..."> -->
    </div>
</body>
<script>
    document.getElementById('start').addEventListener('click', function() {
        const durationMap = { "1": 30, "2": 60, "3": 120, "4": 180 }; // Mapping selection to actual seconds
        const difficulty = document.getElementById('difficulty').value;
        const duration = durationMap[document.getElementById('dropdown').value] || 30; // Default to 30s

        sessionStorage.setItem('duration', duration);
        sessionStorage.setItem('difficulty', difficulty);

        window.location.href = 'test.html';
    });

</script>
</html>
