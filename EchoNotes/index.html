<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Echo Notes☁️</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

</head>
<body>
  <header class="header-area">
    <h1>Echo Notes☁️</h1>
    <nav class="main-nav">
      <a href="#" id="clearNoteBtn">Clear</a>

      <a href="#" id="saveNoteBtn">Save Note as Pdf</a>
      <a href="#" id="changeColorBtn">Text Color</a>
      <a href="#" id="changeSizeBtn">Text Size</a>

    </nav>
  </header>

  <main class="note-section">
    <input id="noteTitle" type="text" placeholder="Title" />
<div id="noteContent" contenteditable="true" class="note-area" spellcheck="false">
 
</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
