<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzaHub - Order Online</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#fff8f0;
}

/* NAVBAR */
nav{
    background:#b71c1c;
    color:white;
    padding:15px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav h1{
    letter-spacing:1px;
}

nav button{
    padding:7px 12px;
    border:none;
    background:#ffcc00;
    color:black;
    font-weight:bold;
    cursor:pointer;
    border-radius:5px;
}

/* HERO */
.hero{
    height:60vh;
    background:url('https://images.unsplash.com/photo-1601924582975-7e2bdb2e7b02?auto=format&fit=crop&w=1600&q=80') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h2{
    background:rgba(0,0,0,0.6);
    padding:20px;
    font-size:38px;
}

/* PRODUCTS */
.products{
    padding:40px 8%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin:10px 0;
}

.price{
    color:#b71c1c;
    font-weight:bold;
}

.card button{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    background:#b71c1c;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

/* CART */
.cart{
    position:fixed;
    right:-350px;
    top:0;
    width:320px;
    height:100%;
    background:white;
    box-shadow:-5px 0 15px rgba(0,0,0,0.2);
    padding:20px;
    transition:0.4s;
    overflow-y:auto;
}

.cart.active{
    right:0;
}

.cart h2{
    margin-bottom:15px;
}

.cart-item{
    margin-bottom:10px;
    border-bottom:1px solid #eee;
    padding-bottom:5px;
}

.total{
    font-weight:bold;
    margin-top:15px;
}

.close{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    cursor:pointer;
    float:right;
}

footer{
    background:#b71c1c;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>
</head>

<body>

<nav>
    <h1>PizzaHub 🍕</h1>
    <button onclick="toggleCart()">Cart 🛒 (<span id="cartCount">0</span>)</button>
</nav>

<section class="hero">
    <h2>Hot & Fresh Pizza Delivered Fast 🔥</h2>
</section>

<section class="products" id="productList"></section>

<div class="cart" id="cart">
    <button class="close" onclick="toggleCart()">X</button>
    <h2>Your Order</h2>
    <div id="cartItems"></div>
    <div class="total">Total: ₹ <span id="totalPrice">0</span></div>
</div>

<footer>
    © 2026 PizzaHub | Fresh Taste Guaranteed
</footer>

<script>
const products = [
    {name:"Margherita", price:299, image:"https://images.unsplash.com/photo-1601924582975-7e2bdb2e7b02"},
    {name:"Farmhouse Special", price:399, image:"https://images.unsplash.com/photo-1594007654729-407eedc4be65"},
    {name:"Pepperoni Blast", price:449, image:"https://images.unsplash.com/photo-1548365328-9f547fb0953d"},
    {name:"Cheese Overload", price:349, image:"https://images.unsplash.com/photo-1593560708920-61dd98c46a4e"}
];

let cart = [];

function displayProducts(){
    const productList = document.getElementById("productList");
    productList.innerHTML="";
    products.forEach((product)=>{
        productList.innerHTML += `
        <div class="card">
            <img src="${product.image}?auto=format&fit=crop&w=400&q=80">
            <h3>${product.name}</h3>
            <div class="price">₹ ${product.price}</div>
            <button onclick="addToCart('${product.name}', ${product.price})">Add to Cart</button>
        </div>`;
    });
}

function addToCart(name,price){
    cart.push({name,price});
    updateCart();
}

function updateCart(){
    let total=0;
    document.getElementById("cartItems").innerHTML="";
    cart.forEach(item=>{
        total+=item.price;
        document.getElementById("cartItems").innerHTML+=`
        <div class="cart-item">
            <div>${item.name}</div>
            <div>₹ ${item.price}</div>
        </div>`;
    });
    document.getElementById("cartCount").innerText=cart.length;
    document.getElementById("totalPrice").innerText=total;
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("active");
}

displayProducts();
</script>

</body>
</html>
